app:
  name: AI Candidate Pool + Quant Filter
  timezone: Asia/Shanghai

runtime:
  default_lookback_days: 120
  feedback_horizons: [1, 3, 5, 10]
  database_path: data/signals.sqlite
  cache_dir: data/cache

market_data:
  provider: baostock   # mock / baostock / akshare
  frequency: 1d
  adjust_type: qfq

ai:
  max_candidates_per_run: 30

decision:
  strong_watch_threshold: 75
  watch_threshold: 55
  risky_threshold: 40
